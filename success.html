<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success - Your Download is Ready!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .success-panel {
            text-align: center;
            max-width: 600px;
            margin: auto;
        }
        .success-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        .download-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 40px;
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.2rem;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
            transition: transform 0.3s ease;
        }
        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(37, 211, 102, 0.5);
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    
    <main class="container" style="justify-content: center;">
        <div class="glass-panel success-panel">
            <div class="success-icon">🎉</div>
            <h1 class="headline">You're In!</h1>
            <p class="subheadline">
                The 15-Minute WhatsApp Sales Cheat Sheet is ready. Click the button below to download your copy instantly. 
            </p>
            <p class="privacy-note">
                (I've also sent a backup copy to your email so you don't lose it.)
            </p>
            <a href="WhatsApp_Marketing_Cheat_Sheet.pdf" class="download-btn" download>
                📥 Download PDF Now
            </a>
        </div>
    </main>
</body>
</html>
